name: Release (TestPyPI)

on:
  workflow_dispatch:
  push:
    tags:
      - "test-v*"

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }} / ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — builds inside manylinux container
          - os: ubuntu-latest
            target: x86_64
            manylinux: auto
          # Linux aarch64 (cross-compiled via QEMU)
          - os: ubuntu-latest
            target: aarch64
            manylinux: auto
          # Windows x86_64
          - os: windows-latest
            target: x86_64
            manylinux: auto
          # macOS Apple Silicon (universal — x86_64 users run via Rosetta 2)
          - os: macos-latest
            target: aarch64
            manylinux: auto
          # macOS x86_64 native
          - os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Needed for Linux aarch64 cross-compilation
      - name: Set up QEMU
        if: matrix.target == 'aarch64' && runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --find-interpreter --out dist

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish to TestPyPI (trusted publishing)
    runs-on: ubuntu-latest
    needs:
      - build-wheels
      - build-sdist
    permissions:
      id-token: write
      contents: read
    environment:
      name: testpypi
      url: https://test.pypi.org/p/subtask-manager

    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten dist directory
        shell: bash
        run: |
          mkdir -p final-dist
          find dist -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} final-dist/ \;
          echo "=== Wheels to publish ==="
          ls -lah final-dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: final-dist
          skip-existing: false